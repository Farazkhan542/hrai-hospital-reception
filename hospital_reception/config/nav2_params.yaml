# Nav2 parameters for the HRAI hospital-reception demo.
# Tuned CONSERVATIVELY for a CPU-only / software-rendering (llvmpipe) machine.
# Only values that differ from typical Nav2 defaults are called out with a
# "# CPU:" note explaining WHY they were changed (for the report).
#
# Robot: TIAGo (differential base, base radius ~0.27 m).

amcl:
  ros__parameters:
    use_sim_time: true
    base_frame_id: base_footprint
    odom_frame_id: odom
    global_frame_id: map
    scan_topic: scan
    robot_model_type: nav2_amcl::DifferentialMotionModel
    max_particles: 800          # CPU: fewer particles (default 2000) — small map
    min_particles: 300
    update_min_d: 0.25          # CPU: only resample after 0.25 m of motion
    update_min_a: 0.25
    laser_max_range: 8.0
    laser_min_range: 0.1
    max_beams: 60               # CPU: subsample the scan (default 60-180)

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0        # CPU: 10 Hz (default 20) halves control-loop load
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 15.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25         # a bit loose — good enough for "guide to room"
      yaw_goal_tolerance: 0.5
      stateful: true

    # DWB local planner (spec: conservative controller + modest speeds).
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      max_vel_x: 0.18               # CPU/safe: low top speed for software rendering
      min_vel_theta: 0.0
      max_vel_theta: 0.8
      acc_lim_x: 1.0
      acc_lim_theta: 1.5
      decel_lim_x: -1.0
      decel_lim_theta: -1.5
      vx_samples: 12                # CPU: fewer trajectory samples (default 20)
      vtheta_samples: 16            # CPU: fewer samples (default 40)
      sim_time: 1.5
      transform_tolerance: 0.3
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0

planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"   # NavFn: cheap global planner
      tolerance: 0.5
      use_astar: false                            # CPU: Dijkstra is fine on a tiny map
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_footprint
      update_frequency: 5.0           # CPU: 5 Hz (default 5-10) — small rolling window
      publish_frequency: 2.0
      rolling_window: true
      width: 4                        # CPU: small 4x4 m rolling window
      height: 4
      resolution: 0.05                # 5 cm cells (spec)
      robot_radius: 0.28
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.4         # CPU/small robot: modest inflation (spec)
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_footprint
      update_frequency: 1.0           # CPU: 1 Hz global update is plenty on a small map
      publish_frequency: 1.0
      resolution: 0.05                # 5 cm cells (spec)
      robot_radius: 0.28
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.4
        cost_scaling_factor: 3.0

map_server:
  ros__parameters:
    use_sim_time: true
    # Point this at the SLAM map you saved (see README mapping step).
    yaml_filename: "hospital_map.yaml"

smoother_server:
  ros__parameters:
    use_sim_time: true

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    max_velocity: [0.18, 0.0, 0.8]    # keep in sync with DWB max_vel_x above
    min_velocity: [-0.18, 0.0, -0.8]
